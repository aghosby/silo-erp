<form class="modal-wrap" [formGroup]="form">
    <section class="modal-header">
        <div class="illustration">
            <!-- <div *ngIf="!data.isExisting" class="img-wrap">
                <img src="assets/img/project/illustrations/user.webp" alt="">
            </div> -->

            <ng-container>
                <app-file-upload
                    formControlName="profilePhoto"
                    [defaultImage]="data.isExisting ? this.data.data.profilePic : 'assets/img/project/illustrations/user.webp'"
                    mode="profile"
                ></app-file-upload>
            </ng-container>
        </div>

        <div class="details">
            <div class="title">{{ data.isExisting ? data.data.firstName + ' ' + data.data.lastName : 'Create Contact' }}</div>
            <div class="preamble">{{ data.isExisting ? 'Edit information' : 'Enter the contact information'}}</div>        
        </div>        
    </section>

    <section class="modal-body">
        <div class="form-trigger-wrap mb-lg-3">
            <div class="inner-wrap">
                <div [class.shiftRight]="!firstTabActive" id="" class="bkg-switch"></div>
                <div (click)="firstTabActive = true" [class.active]="firstTabActive" class="trigger official">Personal Information</div>
                <div (click)="firstTabActive = false" [class.active]="!firstTabActive" class="trigger personal">Contact Information</div>
            </div>
        </div>

        <ng-container *ngIf="firstTabActive">
            <app-dynamic-form
                [fields]="personalInfoFormFields"
                [isLoading]="isLoading"
                [form]="personalFormGroup"
                (valueChanges)="onPersonalFormChanges($event)"
                (formAction)="handleFormAction($event)"
            ></app-dynamic-form>
        </ng-container>

        <ng-container *ngIf="!firstTabActive">
            <app-dynamic-form
                [fields]="contactInfoFormFields"
                [isLoading]="isLoading"
                [form]="contactFormGroup"
                (formAction)="handleFormAction($event)"
            ></app-dynamic-form>
        </ng-container>
    </section>
</form>
