    <div class="page-header">Appraisal KPI Groups</div>
    <div class="main-actions d-flex justify-content-start align-items-center gap-3">
        <!-- <mat-form-field class="field compact-field lg no-base" appearance="outline" [style.width]="'15rem'">
            <mat-label>Select Period</mat-label>
            <mat-select
                class="selectField"
                disableOptionCentering
                panelClass="compact-dropdown"
                [(ngModel)]="periodName"
                style="font-size: 0.7rem;"
            >
                <mat-option *ngFor="let option of periodOptions | keyvalue: keepOrder" [value]="option.key">{{option.value}}</mat-option>
            </mat-select>
        </mat-form-field> -->
        <div (click)="openKpiGroupModal()" class="cta cta-primary icon lg">
            <app-icon [iconName]="'layers'" [iconStrokeWidth]="2" [iconWidth]="20" [iconHeight]="20"></app-icon> New KPI Group
        </div>

<div class="row-section w-100 mt-4">
    <div *ngIf="kpiGroups && kpiGroups.length == 0" class="cont mt-lg-3 mt-4">
        <app-no-data 
            [height]="'10.5rem'"
            [icon]="'layers'"
            [imageUrl]="'assets/img/project/illustrations/puzzle.webp'" 
            [message]="'No KPI Groups created yet'"
        >
        </app-no-data>
    </div>


    <div class="accordion accordion-flush mt-lg-3 mt-3">
        <div *ngFor="let item of kpiGroups; let i = index" class="accordion-item">
            <div class="accordion-header" id="{{'flush-heading-scale'+i}}">
                <button (click)="toggleAccordionInfo(i)" class="accordion-button collapsed" type="button" data-bs-toggle="collapse" [attr.data-bs-target]="'#'+'flush-scale'+i" aria-expanded="false" [attr.aria-controls]="'flush-scale'+i">
                    <div class="name"><span class="weight checked">{{item.weight}}%</span> {{item.groupName}}</div>
                    <div class="chips">
                        <ng-container *ngIf="item.assignedDepartments.length === departmentList.length">
                            <span class="chip">All Departments</span>  
                        </ng-container>
                        <ng-container *ngIf="item.assignedDepartments.length !== departmentList.length">
                            <div *ngFor="let dept of item.assignedDepartments; let k = index">
                                <span class="chip" *ngIf="dept.department_name">{{dept.department_name}}</span>                  
                            </div>
                        </ng-container>
                        
                    </div>
                    <div class="actions">
                        <div *ngIf="loggedInUser.isSuperAdmin || (item.accessLevel != 'Admin' && loggedInUser.isManager) || (item.accessLevel=='Employee' && !loggedInUser.isSuperAdmin && !loggedInUser.isManager)" (click)="openKpiModal(item, 'create')" class="cta cta-trans sm-bd">Create KPI</div>
                        <span *ngIf="loggedInUser.isSuperAdmin || (item.accessLevel != 'Admin' && loggedInUser.isManager)" (click)="openKpiGroupModal(item)" class="table-icon edit ms-lg-3 ms-2" style="font-size: 1rem; color: var(--primary);">
                            <app-icon [iconName]="'userPen'" [iconWidth]="15" [iconHeight]="15"></app-icon>
                        </span>
                        <span *ngIf="loggedInUser.isSuperAdmin || (item.accessLevel!='Admin' && loggedInUser.isManager)" (click)="deleteKpiGroup(item)" class="icon delete ms-lg-3 ms-2"><i class="bi bi-trash3-fill"></i></span>
                    </div>
                    <!-- <div class="app-switch">
                        <input type="checkbox">
                    </div> -->
                </button>
            </div>

            <div [class.show]="activeTab == i" id="{{'flush-level'+i}}" class="accordion-collapse collapse" [attr.aria-labelledby]="'flush-heading-scale'+i" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body pb-lg-4">
                    <section class="mb-2 desc">{{item.description}}</section>
                    <div class="headless-table-wrap">
                        <div class="hdr row-hld">
                            <div class="row-cell">KPI Name</div>
                            <div class="row-cell">Weight</div>
                            <div class="row-cell">Target</div>
                            <div class="row-cell">Threshold</div>
                            <div class="row-cell"></div>
                        </div>
                        <div *ngFor="let kpi of item.groupKpis; let j = index" class="row-hld">
                            <div class="row-cell">{{kpi.kpiName}}</div>
                            <div class="row-cell weight">{{kpi.weight}}%</div>
                            <div class="row-cell">{{kpi.target.toLocaleString()}}</div>
                            <div class="row-cell">{{kpi.threshold.toLocaleString()}}</div>
                            <div class="row-cell">
                                <div class="actions">
                                    <span (click)="openKpiModal(kpi, 'edit')" class="table-icon edit" style="font-size: 1rem; color: var(--primary);">
                                        <app-icon [iconName]="'userStar'" [iconWidth]="15" [iconHeight]="15"></app-icon>
                                    </span>
                                    <span (click)="deleteKpi(kpi)" class="icon delete ms-lg-3 ms-2"><i class="bi bi-trash3-fill"></i></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
