<div class="modal-wrap">
    <section class="modal-header">
        <div class="illustration">
            <div class="img-wrap">
                <img src="assets/img/project/illustrations/puzzle.webp" alt="">
            </div>
        </div>

        <div class="details">
            <div *ngIf="data.statusType === 'lead'" class="title">{{ data.isExisting ? 'Edit Lead Status' : 'Create Lead Status' }}</div>
            <div *ngIf="data.statusType === 'deal'" class="title">{{ data.isExisting ? 'Edit Deal Status' : 'Create Deal Status' }}</div>
            <div *ngIf="data.statusType === 'ticket'" class="title">{{ data.isExisting ? 'Edit Support Ticket Status' : 'Create Support Ticket Status' }}</div>
            <div class="preamble">Enter the status information</div>        
        </div>        
    </section>

    <section class="modal-body">
        <app-dynamic-form
            [fields]="formFields"
            [isLoading]="isLoading"
            (formAction)="handleFormAction($event)"
        ></app-dynamic-form>
    </section>
</div>
